description: phosim basic processing pipeline
instrument: lsst.obs.lsst.LsstCamPhoSim
tasks:
  isr:
    class: lsst.ip.isr.isrTask.IsrTask
    config:
      connections.outputExposure: 'postISRCCD'
      doBias: False
      doVariance: False
      doLinearize: False
      doCrosstalk: False
      doDefect: False
      doNanMasking: False
      doInterpolate: False
      doBrighterFatter: False
      doDark: False
      doFlat: False
      doApplyGains: True
      doFringe: False
      doOverscan: True
  generateDonutCatalog:
    class: lsst.ts.wep.GenerateDonutCatalogTask.GenerateDonutCatalogTask
    config:
      connections.exposure: 'postISRCCD'
  cutOutDonuts:
    class: lsst.ts.wep.CutOutDonutStampsTask.CutOutDonutStampsTask
    config:
      connections.exposure: 'postISRCCD'
      connections.donutCatalog: 'donutCatalog'
  zernikeEstimate:
    class: lsst.ts.wep.ZernikeEstimateTask.ZernikeEstimateTask
    config:
      connections.exposures: 'postISRCCD'
      connections.donutCatalogs: 'donutCatalog'
      connections.donutStamps: 'donutStamps'
